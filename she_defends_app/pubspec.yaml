name: she_defends_app
description: An intelligent personal safety, health, and wellness companion for women.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  dio: ^5.4.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.0.0
  google_maps_flutter: ^2.5.3
  geolocator: ^10.1.0
  flutter_local_notifications: ^16.1.0
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  firebase_messaging: ^15.0.0
  speech_to_text: ^6.3.0
  flutter_tts: ^3.8.3
  fl_chart: ^0.66.0
  image_picker: ^1.0.7
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
