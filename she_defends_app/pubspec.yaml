name: she_defends_app
description: An intelligent personal safety, health, and wellness companion for women.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  dio: ^5.4.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^10.3.1
  google_maps_flutter: ^2.5.3
  geolocator: ^14.0.3
  flutter_local_notifications: ^22.0.1
  firebase_core: ^4.11.0
  firebase_auth: ^6.5.4
  firebase_messaging: ^16.4.1
  speech_to_text: ^7.3.0
  flutter_tts: ^4.2.5
  fl_chart: ^1.2.0
  image_picker: ^1.0.7
  cupertino_icons: ^1.0.6
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
